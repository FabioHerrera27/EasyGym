<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>users lista</title>
</head>
<body>

    <h2>Lista de Usuarios</h2>
    <div id="contenedor-usuarios">Cargando...</div>

    <script>
        fetch('http://localhost:3000/usuarios')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('contenedor-usuarios');
                contenedor.innerHTML = ''; 

                data.forEach(u => {
                    
                    const info = document.createElement('p');
                    info.textContent = `ID: ${u.IDUsuario} - Nombre: ${u.Nombre} - Apellido: ${u.ApellidoPaterno} - Correo: ${u.Correo} - Estatus: ${u.Estatus}`;
                    contenedor.appendChild(info);
                });
            })
            .catch(err => console.error("Error:", err));
    </script>

</body>
</html>
