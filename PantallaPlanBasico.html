<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes - Gimnasio</title>
    <link rel="stylesheet" href="PantallaPlanBasico.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page-wrapper">

        <header class="header">
            <a href="PantallaMembresias.html" class="header-title header-title-link">PLANES</a>
            <div class="header-info">
                <span class="fecha">30/07/2026</span>
                <span class="bienvenido">Bienvenido</span>
            </div>
        </header>

        <div class="plan-container">
            <div class="plan-top">
                <div class="plan-name-block">
                    <span class="plan-name">Básico</span>
                </div>
                <div class="plan-desc-block">
                    <ul>
                        <li>Acceso al gimnasio</li>
                        <li>Uso de equipo general</li>
                        <li>Área de cardio y pesas</li>
                        <li>Sin locker incluido</li>
                        <li>Horario limitado</li>
                    </ul>
                </div>
            </div>

            <div class="plan-bottom">
                <div class="plan-price-block">
                    <span class="plan-price">$800 MXN</span>
                    <span class="plan-period">por 30 días</span>
                </div>
                <a href="finalizarCompraBasico.html" class="plan-cta-block">
                    <span class="cta-text">COMENZAR AHORA</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
