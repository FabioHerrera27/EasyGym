<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Fitness</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/PantallaLogIn.css" />
  </head>
  <body>
    <div class="background-container">
      <section class="login-card shadow-lg">
        <h1>Iniciar sesion</h1>
        <form id="loginForm" class="d-grid gap-3">
          <input class="form-control" type="text" id="username" placeholder="Usuario" required />
          <input class="form-control" type="password" id="password" placeholder="Contrasena" required />
          <button
            type="button"
            class="btn btn-primary fw-bold"
            onclick="window.location.href='PantallaInicioUsuario.html'"
          >
            Entrar
          </button>
        </form>
      </section>
    </div>
  </body>
</html>
