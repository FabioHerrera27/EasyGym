<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Compra</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/finalizarCompraCss.css" />
  </head>
  <body>
    <main class="checkout-page">
      <section class="checkout-card card border-0">
        <button
          type="button"
          class="close-button btn btn-danger"
          aria-label="Cerrar"
          onclick="window.location.href='PantallaPlanEstandar.html'"
        >
          X
        </button>
        <header class="checkout-header">
          <h1>Finalizar compra</h1>
          <p class="plan-label">PLAN ESTANDAR - MONTO $1,200 MXN</p>
        </header>
        <form class="checkout-form">
          <div class="field-row">
            <div class="field-group">
              <label for="nombre">Nombre</label>
              <input id="nombre" name="nombre" class="form-control" type="text" placeholder="Nombre" />
            </div>
            <div class="field-group">
              <label for="apellido">Apellido</label>
              <input id="apellido" name="apellido" class="form-control" type="text" placeholder="Apellido" />
            </div>
          </div>
          <div class="field-row full-width">
            <div class="field-group full-width">
              <label for="direccion">Direccion</label>
              <input id="direccion" name="direccion" class="form-control" type="text" placeholder="Direccion" />
            </div>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label for="ciudad">Ciudad</label>
              <input id="ciudad" name="ciudad" class="form-control" type="text" placeholder="Ciudad" />
            </div>
            <div class="field-group">
              <label for="estado">Estado</label>
              <input id="estado" name="estado" class="form-control" type="text" placeholder="Estado" />
            </div>
          </div>
          <div class="payment-section">
            <p class="payment-title">Metodo de pago</p>
            <p class="payment-method">Tarjeta de debito</p>
            <div class="card-fields">
              <input id="tarjeta" name="tarjeta" class="form-control" type="text" placeholder="Numero de tarjeta" />
              <input id="mmaa" name="mmaa" class="form-control" type="text" placeholder="MM/AA" />
              <input id="cvv" name="cvv" class="form-control" type="text" placeholder="Codigo CVV" />
            </div>
          </div>
          <button type="submit" class="submit-button btn btn-primary">Pagar</button>
        </form>
      </section>
    </main>
  </body>
</html>
