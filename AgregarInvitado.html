<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agregar Invitado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="AgregarInvitadoCss.css" />
  </head>
  <body>
    <main class="pagina-agregar">
      <div class="fondo-capa"></div>

      <button
        type="button"
        class="boton-cerrar btn btn-danger"
        aria-label="Cerrar"
        onclick="window.location.href='PantallaInicioUsuario.html'"
      >
        X
      </button>

      <section class="panel-agregar card border-0">
        <div class="panel-superior">
          <h1>Agregar<br />Invitado</h1>

          <label class="foto-box" for="foto-invitado">
            <span class="foto-placeholder">Foto</span>
            <input id="foto-invitado" name="foto-invitado" class="form-control" type="file" accept="image/*" />
          </label>
        </div>

        <form class="formulario-invitado">
          <div class="campo">
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" class="form-control" type="text" />
          </div>

          <div class="campo">
            <label for="apellido">Apellido</label>
            <input id="apellido" name="apellido" class="form-control" type="text" />
          </div>

          <div class="campo">
            <label for="numero">Numero</label>
            <input id="numero" name="numero" class="form-control" type="text" />
          </div>

          <div class="campo">
            <label for="correo">Correo</label>
            <input id="correo" name="correo" class="form-control" type="email" />
          </div>

          <div class="acciones-formulario">
            <button type="submit" class="boton-agregar btn btn-success">Agregar</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
