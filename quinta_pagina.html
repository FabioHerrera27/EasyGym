<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes - Gimnasio</title>
    <link rel="stylesheet" href="quinta_pagina.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page-wrapper">

        <!-- Header -->
        <header class="header">
            <h1 class="header-title">PLANES</h1>
            <div class="header-info">
                <span class="fecha">30/07/2026</span>
                <span class="bienvenido">Bienvenido</span>
            </div>
        </header>

        <!-- Contenedor del plan con borde blanco -->
        <div class="plan-container">

            <!-- Fila superior: nombre + bullets -->
            <div class="plan-top">
                <div class="plan-name-block">
                    <span class="plan-name">Premium</span>
                </div>
                <div class="plan-desc-block">
                    <ul>
                        <li>Acceso completo al gimnasio</li>
                        <li>Acceso a todas las áreas</li>
                        <li>Locker y toalla incluidos</li>
                        <li>Horario sin restricción</li>
                        <li>3 invitados mensuales</li>
                        <li>Clases grupales ilimitadas</li>
                    </ul>
                </div>
            </div>

            <!-- Fila inferior: precio + CTA -->
            <div class="plan-bottom">
                <div class="plan-price-block">
                    <span class="plan-price">$1,200 MXN</span>
                    <span class="plan-period">por 30 días</span>
                </div>
                <div class="plan-cta-block">
                    <span class="cta-text">COMENZAR AHORA</span>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
