<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes - Gimnasio</title>
    <link rel="stylesheet" href="PantallaPlanEstandar.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="page-wrapper">

        <header class="header">
            <h1 class="header-title">PLANES</h1>
            <div class="header-info">
                <span class="fecha">30/07/2026</span>
                <span class="bienvenido">Bienvenido</span>
            </div>
        </header>

        <div class="plan-container">
            <div class="plan-top">
                <div class="plan-name-block">
                    <span class="plan-name">Estándar</span>
                </div>

                <div class="plan-desc-block">
                    <ul>
                        <li>Acceso completo al gimnasio</li>
                        <li>Acceso a área de box</li>
                        <li>Locker incluido</li>
                        <li>Horario extendido</li>
                        <li>1 invitado ocasional</li>
                    </ul>
                </div>
            </div>

            <div class="plan-bottom">
                <div class="plan-price-block">
                    <span class="plan-price">$1,200 MXN</span>
                    <span class="plan-period">por 30 días</span>
                </div>

                <a href="finalizarCompraEstandar.html" class="plan-cta-block">
                    <span class="cta-text">COMENZAR AHORA</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
